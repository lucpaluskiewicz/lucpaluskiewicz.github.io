<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Page</title>
    <!-- Link to external stylesheet -->
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <h1>Your Name</h1>
            <img class="profile-image" src="static/images/profile.jpg" alt="Your Profile Picture">
            <p>Email: <a class="email" href="mailto:your-email@example.com">your-email@example.com</a></p>
            <!-- Add logos -->
            <div>
                <a href="mailto:your-email@example.com">
                    <img src="static/images/mail-icon.png" alt="Mail Logo"> Email
                </a>
                <a href="https://your-other-page.com">
                    <img src="static/images/link-icon.png" alt="Link Logo"> Other Page
                </a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <h2>Welcome to My Personal Page</h2>
            <p>This is where you can introduce yourself, provide information about your work, or share your portfolio.</p>
        </div>
    </div>
</body>
</html>
